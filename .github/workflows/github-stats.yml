name: Generate GitHub README Stats

on:
  schedule:
    - cron: '0 */12 * * *' # Tự động chạy cập nhật mỗi 12 tiếng một lần
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Stats SVG
        uses: stats-organization/github-readme-stats-action@v2
        with:
          username: dienpq-os
          theme: tokyonight
          show_icons: true
          count_private: true

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Updated local GitHub stats images"
          git push
